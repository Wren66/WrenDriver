name: Build OvO Kernel Module

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Android kernel version tag'
        required: true
        default: 'android14-5.15-2024-05'
      simple_tag:
        description: 'Simple Android kernel version tag'
        required: true
        default: 'android14-5.15'
      arch:
        description: 'Architecture'
        required: true
        default: 'aarch64'

jobs:
  build:
    name: Build for ${{ inputs.simple_tag || 'android14-5.15' }} (${{ inputs.arch || 'aarch64' }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          path: ovo

      - name: Validate input
        shell: bash
        run: |
          VALID_TAGS=("android12-5.10" "android13-5.10" "android13-5.15" "android14-5.15" "android14-6.1" "android15-6.6" "android16-6.12")
          SIMPLE_TAG="${{ github.event.inputs.simple_tag || 'android14-5.15' }}"
          if [[ ! " ${VALID_TAGS[@]} " =~ " ${SIMPLE_TAG} " ]]; then
            echo "Invalid simple-tag: ${SIMPLE_TAG}. Must be one of: ${VALID_TAGS[@]}"
            exit 1
          fi
          if [ ! -d "ovo/ovo" ]; then
            echo "Error: ovo/ovo directory does not exist"
            exit 2
          fi
          if [ ! -f "ovo/ovo/Makefile" ]; then
            echo "Error: ovo/ovo/Makefile does not exist"
            exit 3
          fi

      - name: Install build tools
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: binutils git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libx11-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python3 libelf-dev binutils-aarch64-linux-gnu gcc gzip
          version: 1.0

      - name: Setup Android kernel source
        env:
          TAG: ${{ github.event.inputs.tag || 'android14-5.15-2024-05' }}
        shell: bash
        run: |
          sudo apt-get install -y repo
          mkdir android-kernel
          cd android-kernel
          repo init --depth=1 --u https://android.googlesource.com/kernel/manifest -b common-${TAG} --repo-rev=v2.16
          repo --version
          repo sync -c -j$(nproc) --no-tags

      - name: Setup CCache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ github.event.inputs.simple_tag || 'android14-5.15' }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ github.event.inputs.simple_tag || 'android14-5.15' }}-

      - name: Move module to kernel drivers
        shell: bash
        working-directory: android-kernel
        run: |
          mv ../ovo/ovo common/drivers/ovo
          echo "obj-m += ovo/" >> common/drivers/Makefile
          if [ -f common/android/gki_aarch64_modules ]; then
            echo "drivers/ovo/ovo.ko" >> common/android/gki_aarch64_modules
          fi

      - name: Patch for LKM build
        shell: bash
        working-directory: android-kernel
        run: |
          pip install ast-grep-cli
          sudo apt-get install llvm-15 -y

          ast-grep -U -p '$$$ check_exports($$$) {$$$}' -r '' common/scripts/mod/modpost.c || true
          ast-grep -U -p 'check_exports($$$);' -r '' common/scripts/mod/modpost.c || true

          if [ ! -f build/build.sh ]; then
            sed -i 's/needs unknown symbol/Dont abort when unknown symbol/g' build/kernel/*.sh || echo "No unknown symbol scripts found"
            if [ -f common/modules.bzl ]; then
              sed -i "s/_COMMON_GKI_MODULES_LIST = \[/_COMMON_GKI_MODULES_LIST = \[\"drivers\/ovo\/ovo.ko\",/g" common/modules.bzl || true
            fi
          else
            TARGET_FILE="build/kernel/build.sh"
            if [ ! -f "$TARGET_FILE" ]; then
              TARGET_FILE="build/build.sh"
            fi
            sed -i 's/needs unknown symbol/Dont abort when unknown symbol/g' $TARGET_FILE || true
            sed -i 's/if ! diff -u "\${KERNEL_DIR}\/\${MODULES_ORDER}" "\${OUT_DIR}\/modules\.order"; then/if false; then/g' $TARGET_FILE || true
          fi

      - name: Cleanup protected exports
        shell: bash
        working-directory: android-kernel
        run: |
          rm common/android/abi_gki_protected_exports_* || echo "No protected exports!"
          git config --global user.email "bot@github.actions.org"
          git config --global user.name "github.actions"
          cd common/ && git add -A && git commit -a -m "Add OvO kernel module" || true
          cd ..

      - name: Build kernel module
        env:
          SIMPLE_TAG: ${{ github.event.inputs.simple_tag || 'android14-5.15' }}
        shell: bash
        working-directory: android-kernel
        run: |
          if [[ "${SIMPLE_TAG}" == "android16-6.12" ]]; then
            if [ "${{ github.event.inputs.arch || 'aarch64' }}" = "aarch64" ]; then
              tools/bazel run --disk_cache=/home/runner/.cache/bazel --config=fast --config=stamp --lto=thin //common:kernel_aarch64_dist
            else
              tools/bazel run --disk_cache=/home/runner/.cache/bazel --config=fast --config=stamp --lto=thin //common:kernel_x86_64_dist
            fi
          else
            if [ "${{ github.event.inputs.arch || 'aarch64' }}" = "aarch64" ]; then
              if [ -e build/build.sh ]; then
                LTO=thin BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh CC="/usr/bin/ccache clang"
              else
                tools/bazel run --disk_cache=/home/runner/.cache/bazel --config=fast --config=stamp --lto=thin //common:kernel_aarch64_dist -- --dist_dir=dist
              fi
            else
              if [ -e build/build.sh ]; then
                LTO=thin BUILD_CONFIG=common/build.config.gki.x86_64 build/build.sh CC="/usr/bin/ccache clang"
              else
                tools/bazel run --disk_cache=/home/runner/.cache/bazel --config=fast --config=stamp --lto=thin //common:kernel_x86_64_dist -- --dist_dir=dist
              fi
            fi
          fi

      - name: Prepare artifacts
        env:
          SIMPLE_TAG: ${{ github.event.inputs.simple_tag || 'android14-5.15' }}
          ARCH: ${{ github.event.inputs.arch || 'aarch64' }}
        shell: bash
        run: |
          if [[ "${SIMPLE_TAG}" == "android16-6.12" ]]; then
            if [ "${ARCH}" = "aarch64" ]; then
              OUTDIR=android-kernel/out/kernel_aarch64/dist
            else
              OUTDIR=android-kernel/out/kernel_x86_64/dist
            fi
          else
            OUTDIR=android-kernel/out/${SIMPLE_TAG}/dist
            if [ ! -e $OUTDIR ]; then
              OUTDIR=android-kernel/dist
            fi
          fi

          mkdir -p output
          echo "Output directory contents:"
          ls -al $OUTDIR/ || true

          if [ -f $OUTDIR/ovo.ko ]; then
            cp $OUTDIR/ovo.ko ./output/${SIMPLE_TAG}_${ARCH}_ovo.ko
            echo "Built: ${SIMPLE_TAG}_${ARCH}_ovo.ko"
          else
            echo "ovo.ko not found in $OUTDIR"
            find android-kernel -name "ovo.ko" -type f 2>/dev/null
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OvO-module-${{ github.event.inputs.simple_tag || 'android14-5.15' }}-${{ github.event.inputs.arch || 'aarch64' }}
          path: output/*.ko
          if-no-files-found: error
